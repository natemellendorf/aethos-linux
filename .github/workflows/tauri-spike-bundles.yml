name: Tauri Spike Bundles

on:
  workflow_dispatch:
  push:
    paths:
      - "spikes/tauri-desktop/**"
      - ".github/workflows/tauri-spike-bundles.yml"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: appimage,deb
            artifact_name: tauri-spike-linux
            artifact_path: |
              spikes/tauri-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              spikes/tauri-desktop/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            bundles: dmg
            artifact_name: tauri-spike-macos
            artifact_path: spikes/tauri-desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            bundles: nsis
            artifact_name: tauri-spike-windows
            artifact_path: spikes/tauri-desktop/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        run: npm ci
        working-directory: spikes/tauri-desktop

      - name: Build Tauri spike bundles
        run: npm run tauri:build -- --bundles ${{ matrix.bundles }}
        working-directory: spikes/tauri-desktop

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
